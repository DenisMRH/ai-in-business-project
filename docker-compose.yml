services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calorai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calorai}
      POSTGRES_DB: ${POSTGRES_DB:-calorai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calorai} -d ${POSTGRES_DB:-calorai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vllm:
    image: vllm/vllm-openai:latest
    command:
      - --model
      - Qwen/Qwen2.5-72B-Instruct
      - --tensor-parallel-size
      - "4"
      - --gpu-memory-utilization
      - "0.85"
      - --max-model-len
      - "8192"
      - --trust-remote-code
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 15m
    ports:
      - "8000:8000"
    shm_size: "16gb"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "0"
                - "1"
                - "2"
                - "3"
              capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://vllm:8000/v1}
    command: python -m app.bot.run
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      vllm:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "3"
              capabilities: [gpu]

volumes:
  postgres_data:
  huggingface_cache:
